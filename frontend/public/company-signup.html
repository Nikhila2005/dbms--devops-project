<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Company Registration</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <header>
    <h1>
      <span class="material-icons" style="font-size: 2.5rem; margin-right: 0.5rem; vertical-align: middle;">business_center</span>
      Company Registration
    </h1>
    <p style="margin: 1rem 0 0 0; font-size: 1.1rem; opacity: 0.9;">Register your company to start recruiting</p>
  </header>
  
  <main>
    <form id="companySignupForm" class="card">
      <h2>
        <span class="material-icons" style="font-size: 1.5rem; margin-right: 0.5rem; vertical-align: middle;">business</span>
        Register Your Company
      </h2>
      
      <div class="form-group">
        <label for="name" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">business</span>
          Company Name
        </label>
        <input type="text" id="name" name="name" placeholder="Enter your company name" required />
      </div>
      
      <div class="form-group">
        <label for="website" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">language</span>
          Website
        </label>
        <input type="url" id="website" name="website" placeholder="https://yourcompany.com" required />
      </div>
      
      <div class="form-group">
        <label for="contactEmail" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">email</span>
          Contact Email
        </label>
        <input type="email" id="contactEmail" name="contactEmail" placeholder="hr@yourcompany.com" required />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">lock</span>
          Password
        </label>
        <input type="password" id="password" name="password" placeholder="Create a strong password" required />
      </div>
      
      <button type="submit" class="btn">
        <span class="material-icons">business_center</span>
        Register Company
      </button>
      
      <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
        <p style="color: var(--gray-600); margin: 0;">
          Already have a company account? 
          <a href="company-login.html" style="color: var(--primary-600); text-decoration: none; font-weight: 500;">Sign in here</a>
        </p>
      </div>
    </form>
  </main>
  
  <script>
    document.getElementById('companySignupForm').onsubmit = async function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      
      // Show loading state
      submitBtn.innerHTML = '<span class="spinner"></span> Registering...';
      submitBtn.disabled = true;
      
      try {
        const data = Object.fromEntries(new FormData(this));
        const res = await fetch('/api/company/signup', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        const result = await res.json();
        
        if (!res.ok) {
          alert(result.message || 'Registration failed');
          return;
        }
        
        // Success animation
        submitBtn.innerHTML = '<span class="material-icons">check</span> Company Registered!';
        submitBtn.style.background = 'linear-gradient(135deg, var(--success-500), var(--success-600))';
        
        setTimeout(() => {
          window.location.href = 'company-login.html';
        }, 1500);
        
      } catch (error) {
        console.error('Registration error:', error);
        alert('An error occurred. Please try again.');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        submitBtn.style.background = '';
      }
    };
  </script>
   <script src="script.js"></script>
</body>
</html>
