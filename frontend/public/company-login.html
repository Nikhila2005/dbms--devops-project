<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Company Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <header>
    <h1>
      <span class="material-icons" style="font-size: 2.5rem; margin-right: 0.5rem; vertical-align: middle;">business</span>
      Company Login
    </h1>
    <p style="margin: 1rem 0 0 0; font-size: 1.1rem; opacity: 0.9;">Access your company dashboard</p>
  </header>
  
  <main>
    <form id="companyLoginForm" class="card">
      <h2>
        <span class="material-icons" style="font-size: 1.5rem; margin-right: 0.5rem; vertical-align: middle;">business_center</span>
        Company Sign In
      </h2>
      
      <div class="form-group">
        <label for="email" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">email</span>
          Company Email
        </label>
        <input type="email" id="email" name="email" placeholder="Enter your company email" required />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">
          <span class="material-icons" style="font-size: 1rem; margin-right: 0.25rem; vertical-align: middle;">lock</span>
          Password
        </label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      
      <button type="submit" class="btn">
        <span class="material-icons">login</span>
        Sign In
      </button>
      
      <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
        <p style="color: var(--gray-600); margin: 0;">
          Don't have a company account? 
          <a href="company-signup.html" style="color: var(--primary-600); text-decoration: none; font-weight: 500;">Register here</a>
        </p>
      </div>
    </form>
  </main>
  
  <script>
    document.getElementById('companyLoginForm').onsubmit = async function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      
      // Show loading state
      submitBtn.innerHTML = '<span class="spinner"></span> Signing In...';
      submitBtn.disabled = true;
      
      try {
        const data = Object.fromEntries(new FormData(this));
        const res = await fetch('/api/company/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: data.email, password: data.password })
        });
        
        if (res.ok) {
          const result = await res.json();
          // Store company info in localStorage if needed
          localStorage.setItem('companyId', result.companyId);
          localStorage.setItem('companyName', result.name);
          
          // Success animation
          submitBtn.innerHTML = '<span class="material-icons">check</span> Success!';
          submitBtn.style.background = 'linear-gradient(135deg, var(--success-500), var(--success-600))';
          
          setTimeout(() => {
            window.location.href = 'company-dashboard.html';
          }, 1000);
        } else {
          const errorText = await res.text();
          alert(errorText);
        }
      } catch (error) {
        console.error('Login error:', error);
        alert('An error occurred. Please try again.');
      } finally {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
        submitBtn.style.background = '';
      }
    };
  </script>
   <script src="script.js"></script>
</body>
</html>
